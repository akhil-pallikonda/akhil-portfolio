<section id="projects" class="projects-section">
  <div class="max-w-5xl mx-auto">
    <div scrollAnimate [animationDelay]="0" class="mb-10 md:mb-12">
      <p class="text-appleBlue text-xs sm:text-sm font-medium tracking-[0.1em] uppercase mb-3">Portfolio</p>
      <h2 class="projects-heading font-medium tracking-tight text-appleText">Featured Projects</h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-5 md:gap-6">
      @for (project of projects; track project.title; let i = $index) {
        <div
          scrollAnimate
          [animationDelay]="i * 120"
          class="project-card rounded-[20px] sm:rounded-[24px] p-6 sm:p-8 flex flex-col gap-4 sm:gap-5"
          [class.md:col-span-2]="i === 0"
        >
          <!-- Header -->
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <span
                class="inline-block text-xs font-semibold px-3 py-1 rounded-full mb-2 sm:mb-3"
                [style.background]="project.companyColor + '22'"
                [style.color]="project.companyColor"
              >
                {{ project.company }}
              </span>
              <h3 class="text-lg sm:text-xl font-semibold text-appleText leading-snug">{{ project.title }}</h3>
            </div>
            <!-- Links -->
            <div class="flex gap-2 shrink-0 mt-1">
              <a [href]="project.githubUrl" target="_blank" class="project-icon-btn" aria-label="GitHub">
                <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="currentColor" viewBox="0 0 24 24">
                  <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"/>
                </svg>
              </a>
            </div>
          </div>

          <!-- Description -->
          <p class="text-appleMuted text-sm leading-relaxed flex-1">{{ project.description }}</p>

          <!-- Tech Stack -->
          <div class="flex flex-wrap gap-1.5 sm:gap-2">
            @for (tech of project.tech; track tech) {
              <span class="tech-tag">{{ tech }}</span>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
